<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PCB Calc Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5;
    padding: 15px;
    color: #333;
    margin: 0;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    max-width: 450px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #1a73e8;
    font-size: 22px;
    margin-bottom: 20px;
}

label {
    display: block;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 5px;
    color: #555;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 16px;
    margin-bottom: 10px;
}

details {
    background: #f8f9fa;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 20px;
    border: 1px solid #eee;
}

summary {
    font-size: 14px;
    font-weight: bold;
    color: #1a73e8;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.btn-calc {
    background: #1a73e8;
    color: white;
}

.btn-share {
    background: #34a853;
    color: white;
}

#res-container {
    margin-top: 20px;
    border-top: 2px solid #f0f0f0;
    padding-top: 15px;
    display: none;
}

.bloque-res {
    background: #fdfdfd;
    border: 1px solid #eee;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
}

.res-item {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 14px;
    border-bottom: 1px dashed #eee;
}

.total-row {
    display: flex;
    justify-content: space-between;
    padding-top: 8px;
    margin-top: 5px;
    font-weight: bold;
    color: #d93025;
    font-size: 16px;
}

textarea {
    height: 260px;
    font-family: monospace;
    font-size: 17px;
    line-height: 1.5;
    background: #fafafa;
    resize: vertical;
    padding: 14px;
}
</style>
</head>
<body>

<div class="card">
<h1>Calculadora PCB</h1>

<details>
<summary>⚙️ Configuración</summary>

<label>Valor Dólar ($)</label>
<input type="number" id="dolar">

<label>Pértinax</label>
<input type="number" id="cfgPertinax">

<label>CEM</label>
<input type="number" id="cfgCem">

<label>FR4</label>
<input type="number" id="cfgFr4">

<label>PTH</label>
<input type="number" id="cfgPth">

<label>Máscara</label>
<input type="number" id="cfgMascara">

<label>Serigrafía</label>
<input type="number" id="cfgSerigrafia">
</details>

<div class="grid">
    <div>
        <label>Largo (cm)</label>
        <input type="number" id="largo">
    </div>
    <div>
        <label>Ancho (cm)</label>
        <input type="number" id="ancho">
    </div>
</div>

<div class="grid">
    <div>
        <label>Cantidad</label>
        <input type="number" id="cantidad" value="1" min="1">
    </div>
    <div>
        <label>Tipo</label>
        <select id="tipoPlaca">
            <option value="simple">Simple Faz</option>
            <option value="doble">Doble Faz (PTH)</option>
        </select>
    </div>
</div>

<label>Máscaras de componentes</label>
<select id="cantMascaras">
    <option value="1">1 Máscara</option>
    <option value="2">2 Máscaras</option>
</select>

<button class="btn-calc" onclick="calcular()">GENERAR PRESUPUESTO</button>

<div id="res-container">
    <div id="lista-precios"></div>
    <label>Mensaje para enviar:</label>
    <textarea id="textoEditable"></textarea>
    <button class="btn-share" onclick="compartirWhatsApp()">ENVIAR POR WHATSAPP</button>
</div>
</div>

<script>
const valoresDefault = {
    dolar: 1100,
    cfgPertinax: 5,
    cfgCem: 7,
    cfgFr4: 9,
    cfgPth: 15,
    cfgMascara: 6,
    cfgSerigrafia: 6
};

window.onload = function() {
    for (let id in valoresDefault) {
        const valor = localStorage.getItem(id) || valoresDefault[id];
        document.getElementById(id).value = valor;

        document.getElementById(id).addEventListener('input', function() {
            localStorage.setItem(id, this.value);
        });
    }
};

function redondear500(num) {
    let valor = Math.round(num / 500) * 500;
    return (valor < 500) ? 500 : valor;
}

function fP(num) {
    return num.toLocaleString('es-AR');
}

function calcular() {
    const l = parseFloat(document.getElementById('largo').value);
    const a = parseFloat(document.getElementById('ancho').value);
    const d = parseFloat(document.getElementById('dolar').value);
    const cant = parseInt(document.getElementById('cantidad').value) || 1;
    const m_cant = parseInt(document.getElementById('cantMascaras').value);
    const tipo = document.getElementById('tipoPlaca').value;

    if (l <= 0 || a <= 0 || d <= 0) {
        alert("Ingrese valores válidos.");
        return;
    }

    const vMascara = parseFloat(document.getElementById('cfgMascara').value);
    const vSerigrafia = parseFloat(document.getElementById('cfgSerigrafia').value);

    const sup = (l * a) / 100;

    const costoMascaraNum = redondear500((sup * d * vMascara) * m_cant * cant);
    const costoSerigrafiaNum = redondear500((sup * d * vSerigrafia) * cant);

    let materiales = tipo === "simple"
        ? [
            { n: "Pértinax", f: parseFloat(document.getElementById('cfgPertinax').value) },
            { n: "CEM",      f: parseFloat(document.getElementById('cfgCem').value) },
            { n: "FR4",      f: parseFloat(document.getElementById('cfgFr4').value) }
        ]
        : [
            { n: "PTH",      f: parseFloat(document.getElementById('cfgPth').value) }
        ];

    let html = "";
    let textoMsg = `*PRESUPUESTO PCB*\n${l}x${a} cm | Cant: ${cant}\n---\n\n`;

    materiales.forEach(m => {
        const costoMat = redondear500(sup * d * m.f * cant);
        const total = costoMat + costoMascaraNum + costoSerigrafiaNum;

        html += `
        <div class="bloque-res">
            <div class="res-item"><span>${m.n}</span><span>$${fP(costoMat)}</span></div>
            <div class="res-item"><span>Máscara</span><span>$${fP(costoMascaraNum)}</span></div>
            <div class="res-item"><span>Serigrafía</span><span>$${fP(costoSerigrafiaNum)}</span></div>
            <div class="total-row"><span>TOTAL</span><span>$${fP(total)}</span></div>
        </div>`;

        textoMsg += `*${m.n}*\n`;
        textoMsg += `- Placas: $${fP(costoMat)}\n`;
        textoMsg += `- Máscara: $${fP(costoMascaraNum)}\n`;
        textoMsg += `- Serigrafía: $${fP(costoSerigrafiaNum)}\n`;
        textoMsg += `> *TOTAL: $${fP(total)}*\n\n`;
    });

    document.getElementById('lista-precios').innerHTML = html;
    document.getElementById('res-container').style.display = "block";
    document.getElementById('textoEditable').value = textoMsg;
}

function compartirWhatsApp() {
    const texto = document.getElementById('textoEditable').value;
    window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
}
</script>

</body>
</html>
